name: Build and test project
on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    format:
        runs-on: ubuntu-latest
        name: Check code formatting
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run check-format
    build:
        runs-on: ubuntu-latest
        name: Build project
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run build
    test:
        runs-on: ubuntu-latest
        name: Test project
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm test
